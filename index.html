<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>兮 · 欢迎</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&family=Long+Cang&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/reset.css" />
    <link rel="stylesheet" href="assets/css/common.css" />
    <link rel="stylesheet" href="assets/css/pages.css" />
  </head>
  <body class="page-welcome">
    <!-- 共享 SVG 滤镜：毛边 / 飞白 -->
    <svg width="0" height="0" style="position: absolute">
      <defs>
        <filter id="rough-s" x="-20%" y="-20%" width="140%" height="140%">
          <feTurbulence type="fractalNoise" baseFrequency="0.12" numOctaves="3" result="n" seed="7" />
          <feDisplacementMap in="SourceGraphic" in2="n" scale="5" />
        </filter>
        <filter id="rough-l" x="-20%" y="-20%" width="140%" height="140%">
          <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="4" result="n" seed="3" />
          <feDisplacementMap in="SourceGraphic" in2="n" scale="11" />
        </filter>
      </defs>
    </svg>

    <div class="app">
      <div class="welcome-video">
        <!-- 占位"视频"：夜视绿噪点 + 漂移光斑。替换真素材时改成 <video src=... autoplay muted loop playsinline> -->
        <canvas data-noise data-tint="70,150,100" data-glow="1" data-vignette="0.8"></canvas>

        <!-- 印章 logo：梦 · 龙藏行书 -->
        <svg class="seal welcome-seal" viewBox="0 0 90 190">
          <g filter="url(#rough-s)">
            <ellipse cx="45" cy="95" rx="33" ry="82" fill="none" stroke="#f2f0ea" stroke-width="5" />
            <text
              x="45"
              y="114"
              font-size="56"
              text-anchor="middle"
              fill="#f2f0ea"
              style="font-family: var(--font-hand)"
            >
              梦
            </text>
            <circle cx="14" cy="152" r="3.4" fill="#f2f0ea" />
            <circle cx="24" cy="166" r="2" fill="#f2f0ea" />
            <circle cx="72" cy="30" r="2.6" fill="#f2f0ea" />
            <circle cx="79" cy="140" r="1.8" fill="#f2f0ea" />
            <circle cx="8" cy="60" r="1.5" fill="#f2f0ea" />
          </g>
        </svg>
      </div>

      <p class="enter-hint">轻 触 进 入</p>

      <footer class="icp">
        <span>京ICP备00000000号（占位）</span>
      </footer>
    </div>

    <script src="assets/js/common.js"></script>
    <script>
      document.querySelector(".app").addEventListener("click", () => {
        document.body.style.transition = "opacity .6s ease";
        document.body.style.opacity = "0";
        setTimeout(() => (location.href = "subindex.html"), 600);
      });
    </script>
  </body>
</html>
